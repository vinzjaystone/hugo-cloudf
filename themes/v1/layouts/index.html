<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MyWebsite</div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#services" class="nav-link">Services</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section with Image Slider -->
    <section class="hero" id="home">
        <div class="slider">
            <div class="slide fade">
                <img src="https://via.placeholder.com/1200x500/FF6B6B/FFFFFF?text=Image+1" alt="Slide 1">
            </div>
            <div class="slide fade">
                <img src="https://via.placeholder.com/1200x500/4ECDC4/FFFFFF?text=Image+2" alt="Slide 2">
            </div>
            <div class="slide fade">
                <img src="https://via.placeholder.com/1200x500/45B7D1/FFFFFF?text=Image+3" alt="Slide 3">
            </div>

            <!-- Navigation buttons -->
            <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
            <a class="next" onclick="changeSlide(1)">&#10095;</a>
        </div>

        <!-- Slider dots -->
        <div class="dots-container">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </section>

    <!-- Messages Section -->
    <section class="messages" id="about">
        <h2>Latest Updates</h2>
        <p>We are excited to announce our new service!</p>
        <p>Stay tuned for more updates.</p>
    </section>

    <!-- Footer -->
    <footer class="footer" id="contact">
        <p>Contact us: info@example.com</p>
        <p>&copy; 2026 My Website</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
